*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0e1a;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
input,button{outline:none;-webkit-appearance:none;font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fade-in{animation:fadeIn .25s ease}
.pulse{animation:pulse 1.8s infinite}
::-webkit-scrollbar{width:3px;height:3px}

.card{background:#111827;border:1px solid #1e2736;border-radius:14px;padding:16px;margin-bottom:10px}
.chip{border:none;cursor:pointer;transition:all .15s}
.chip:active{transform:scale(.95)}
.row{padding:13px 16px;border-bottom:1px solid #0f1624;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .1s}
.row:active{background:#111827}
.hscroll{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;-webkit-overflow-scrolling:touch}
.hscroll::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 14px;border-radius:9px;font-size:12px;cursor:pointer;border:1px solid #1e2736;background:#111827;color:#6b7280;transition:all .15s;white-space:nowrap}
.tab.active{background:#0f2a22;border-color:#00e5a0;color:#00e5a0;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.sbar-bg{background:#1a1f2e;border-radius:4px;height:5px;width:100%;margin-top:6px;overflow:hidden}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbl{width:100%;border-collapse:collapse}
.tbl td{padding:10px 0;border-bottom:1px solid #1a2030;font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.sticky-hdr{position:sticky;top:0;z-index:30;background:#0a0e1a}
</style>

// Vercel Server API - kein CORS Problem!
async function getQ(sym){
  try{
    const r=await fetch('/api/quote?sym='+encodeURIComponent(sym));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.ok&&parseFloat(d.price)>0){
      return {c:parseFloat(d.price),ch:d.change,pct:d.changePct,pc:parseFloat(d.price)-parseFloat(d.change||0)};
    }
  }catch(e){}
  return null;
}
async function getC(sym){
  try{
    const r=await fetch('/api/chart?sym='+encodeURIComponent(sym));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.ok&&d.c&&d.c.length>3)return d;
  }catch(e){}
  return null;
}

const CATS=['Alle','Software','Semis','Security','Cloud','Hardware','Social','Finance','Healthcare','Fintech','Media','Tech','Retail','Automotive','Aerospace','Energy','Industrial','Consumer'];
let CUR=null,TAB='analyse',CAT='Alle',Q='';
let PR={},LD={},CD={};
const G=id=>document.getElementById(id);
const SC=s=>s>=7?'#00e5a0':s>=5?'#f5c518':'#ff4d6d';
const SB=s=>`<div class="sbar-bg"><div style="width:${s*10}%;height:100%;background:${SC(s)};border-radius:4px"></div></div>`;
const filtered=()=>DB.filter(c=>(CAT==='Alle'||c.cat===CAT)&&(!Q||c.t.includes(Q)||c.n.toUpperCase().includes(Q)||c.s.toUpperCase().includes(Q)));

async function loadPrice(sym){
  if(LD[sym])return;
  LD[sym]=true;
  const d=await getQ(sym);
  LD[sym]=false;
  if(d&&d.c&&d.c>0){
    PR[sym]={p:parseFloat(d.c).toFixed(2),c:parseFloat(d.ch||0).toFixed(2),pct:parseFloat(d.pct||0).toFixed(2),ok:true};
  } else {
    const co=DB.find(x=>x.t===sym);
    PR[sym]={p:(co?co.kurs:0).toString(),c:'0.00',pct:'0.00',ok:false};
  }
  if(CUR===sym)drawDetail();else drawList();
}
async function refreshPrice(sym){delete PR[sym];LD[sym]=false;await loadPrice(sym);}
function refreshAll(){PR={};LD={};filtered().slice(0,25).forEach(c=>loadPrice(c.t));}

function pH(sym,big){
  const d=PR[sym];
  if(!d){loadPrice(sym);const s=big?18:12;return `<span style="width:${s}px;height:${s}px;border:2px solid #2d3748;border-top-color:#00e5a0;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle"></span>`;}
  const pos=parseFloat(d.c)>=0,col=!d.ok?'#6b7280':pos?'#00e5a0':'#ff4d6d',arr=pos?'▲':'▼';
  if(!d.ok)return `<span style="color:#6b7280;font-size:${big?22:13}px;font-weight:700">${d.p}$</span>`;
  return `<span style="font-size:${big?22:13}px;font-weight:700;color:${col}">${d.p}$</span> <span style="font-size:${big?13:11}px;color:${col}">${arr}${Math.abs(d.c)} (${Math.abs(d.pct)}%)</span>`;
}

async function loadCandles(sym){
  if(CD[sym]!==undefined)return; CD[sym]=null;
  const d=await getC(sym); if(d)CD[sym]=d;
  if(CUR===sym&&TAB==='chart')drawDetail();
}

  else{
    const n=24;prices=[];highs=[];lows=[];
    for(let i=0;i<n;i++){const t=i/n,base=co.s2+(co.kurs-co.s2)*Math.pow(t,0.7),noise=(Math.random()-0.5)*0.03*base;prices.push(base+noise);highs.push((base+noise)*1.015);lows.push((base+noise)*0.985);}
  }
  const n=prices.length,minP=Math.min(...lows)*0.98,maxP=Math.max(...highs)*1.02,rng=maxP-minP;
  if(rng===0)return '<p style="color:#6b7280;padding:20px">Keine Daten</p>';
  const px=i=>PL+(i/(n-1))*CW,py=v=>PT+CH-((v-minP)/rng)*CH;
  const up=prices[n-1]>prices[0],lc=up?'#00e5a0':'#ff4d6d';
  let path=`M${px(0)},${py(prices[0])}`;
  for(let i=1;i<n;i++)path+=` L${px(i)},${py(prices[i])}`;
  const area=path+` L${px(n-1)},${PT+CH} L${PL},${PT+CH} Z`;
  const yg=[];for(let i=0;i<=4;i++){const v=minP+(rng/4)*i;yg.push({v,y:py(v)});}
  const zones=[{v:co.s2,c:'#00e5a0',l:'S2'},{v:co.s1,c:'#00e5a0',l:'S1'},{v:co.w1,c:'#ff4d6d',l:'W1'},{v:co.w2,c:'#ff4d6d',l:'W2'}].filter(z=>z.v>=minP&&z.v<=maxP);
  const id='cg'+sym.replace('.','');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
  <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lc}" stop-opacity="0.22"/><stop offset="100%" stop-color="${lc}" stop-opacity="0"/></linearGradient>
  <clipPath id="cp${id}"><rect x="${PL}" y="${PT}" width="${CW}" height="${CH}"/></clipPath></defs>
  ${yg.map(l=>`<line x1="${PL}" y1="${l.y}" x2="${W-PR2}" y2="${l.y}" stroke="#1e2736" stroke-width="1"/><text x="${PL-4}" y="${l.y+4}" fill="#4b5563" font-size="9" text-anchor="end">${l.v>=1000?(l.v/1000).toFixed(1)+'k':Math.round(l.v)}</text>`).join('')}
  <path d="${area}" fill="url(#${id})" clip-path="url(#cp${id})"/>
  <path d="${path}" fill="none" stroke="${lc}" stroke-width="2.5" stroke-linecap="round" clip-path="url(#cp${id})"/>
  ${zones.map(z=>`<g clip-path="url(#cp${id})"><line x1="${PL}" y1="${py(z.v)}" x2="${W-PR2}" y2="${py(z.v)}" stroke="${z.c}" stroke-width="1" stroke-dasharray="5,3" opacity="0.8"/><text x="${PL+3}" y="${py(z.v)-3}" fill="${z.c}" font-size="9">${z.l} ${z.v}$</text></g>`).join('')}
  <circle cx="${px(n-1)}" cy="${py(prices[n-1])}" r="5" fill="${lc}" stroke="#0a0e1a" stroke-width="2.5"/>
  <rect x="${px(n-1)-24}" y="${py(prices[n-1])-13}" width="48" height="17" rx="4" fill="${lc}"/>
  <text x="${px(n-1)}" y="${py(prices[n-1])-2}" fill="#0a0e1a" font-size="10" font-weight="700" text-anchor="middle">${prices[n-1].toFixed(0)}$</text>
  ${!real?`<text x="${W/2}" y="${H-2}" fill="#374151" font-size="9" text-anchor="middle">Schätzung - echte Daten laden...</text>`:''}
  </svg>`;
}
